name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          GODIR="/tmp/go-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          mkdir -p "$GODIR"
          curl -sSL https://go.dev/dl/go1.24.0.linux-amd64.tar.gz | tar -C "$GODIR" -xz
          export GOROOT="$GODIR/go"
          export PATH="$GODIR/go/bin:$HOME/go/bin:$PATH"
          go mod download
          go vet ./...
          go test -race -cover ./...

  lint:
    name: Lint
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: |
          GODIR="/tmp/go-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          mkdir -p "$GODIR"
          curl -sSL https://go.dev/dl/go1.24.0.linux-amd64.tar.gz | tar -C "$GODIR" -xz
          export GOROOT="$GODIR/go"
          export PATH="$GODIR/go/bin:$HOME/go/bin:$PATH"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $HOME/go/bin latest
          golangci-lint run --timeout=5m --allow-parallel-runners --issues-exit-code=0

  build:
    name: Build
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          GODIR="/tmp/go-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          mkdir -p "$GODIR"
          curl -sSL https://go.dev/dl/go1.24.0.linux-amd64.tar.gz | tar -C "$GODIR" -xz
          export GOROOT="$GODIR/go"
          export PATH="$GODIR/go/bin:$HOME/go/bin:$PATH"
          go build -o bin/pihole-tui ./cmd/pihole-tui
